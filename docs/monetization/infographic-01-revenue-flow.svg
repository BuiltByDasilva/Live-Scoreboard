<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Live Scoreboard revenue and automatic skin unlock flow</title>
  <desc id="desc">Six-step payment architecture using the extension, a backend, Stripe Checkout, webhooks, entitlements, and automatic unlock.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#b8ff16"/>
    </marker>
    <style>
      .title{font:900 54px Inter,Arial,sans-serif;fill:#fffdf5}.sub{font:600 22px Inter,Arial,sans-serif;fill:#9da39b}
      .step{font:900 18px Inter,Arial,sans-serif;fill:#b8ff16}.head{font:850 21px Inter,Arial,sans-serif;fill:#fffdf5}
      .body{font:600 16px Inter,Arial,sans-serif;fill:#c6cbc4}.tiny{font:700 17px Inter,Arial,sans-serif;fill:#9da39b}
      .num{font:950 25px Inter,Arial,sans-serif;fill:#080a08;text-anchor:middle;dominant-baseline:middle}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#070908"/>
  <circle cx="90" cy="88" r="48" fill="#111511" stroke="#b8ff16" stroke-width="5" filter="url(#glow)"/>
  <text x="90" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter,Arial" font-size="19" font-weight="950" fill="#fffdf5">2026</text>
  <circle cx="126" cy="122" r="8" fill="#ff5d4d"/>
  <text x="160" y="82" class="title">How a skin purchase becomes revenue</text>
  <text x="160" y="119" class="sub">Secure checkout outside the extension. Automatic unlock inside it.</text>

  <line x1="250" y1="356" x2="335" y2="356" stroke="#b8ff16" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="510" y1="356" x2="595" y2="356" stroke="#b8ff16" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="770" y1="356" x2="855" y2="356" stroke="#b8ff16" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1030" y1="356" x2="1115" y2="356" stroke="#b8ff16" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="356" x2="1375" y2="356" stroke="#b8ff16" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(50 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#303530" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#b8ff16"/><text x="32" y="33" class="num">1</text>
    <text x="24" y="82" class="step">EXTENSION</text>
    <text x="24" y="118" class="head">Pick a skin</text>
    <text x="24" y="157" class="body"><tspan x="24">User previews and</tspan><tspan x="24" dy="27">chooses one skin,</tspan><tspan x="24" dy="27">five credits, or</tspan><tspan x="24" dy="27">all 2026 skins.</tspan></text>
  </g>

  <g transform="translate(310 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#303530" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#b8ff16"/><text x="32" y="33" class="num">2</text>
    <text x="24" y="82" class="step">BACKEND</text>
    <text x="24" y="118" class="head">Create checkout</text>
    <text x="24" y="157" class="body"><tspan x="24">Server validates</tspan><tspan x="24" dy="27">license ID + SKU</tspan><tspan x="24" dy="27">and selects the</tspan><tspan x="24" dy="27">real Stripe price.</tspan></text>
  </g>

  <g transform="translate(570 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#303530" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#b8ff16"/><text x="32" y="33" class="num">3</text>
    <text x="24" y="82" class="step">STRIPE</text>
    <text x="24" y="118" class="head">Collect securely</text>
    <text x="24" y="157" class="body"><tspan x="24">Hosted Checkout</tspan><tspan x="24" dy="27">collects email and</tspan><tspan x="24" dy="27">payment details on</tspan><tspan x="24" dy="27">Stripe's HTTPS page.</tspan></text>
  </g>

  <g transform="translate(830 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#303530" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#ff5d4d"/><text x="32" y="33" class="num">4</text>
    <text x="24" y="82" class="step" fill="#ff5d4d">WEBHOOK</text>
    <text x="24" y="118" class="head">Verify webhook</text>
    <text x="24" y="157" class="body"><tspan x="24">Stripe sends a</tspan><tspan x="24" dy="27">signed event. The</tspan><tspan x="24" dy="27">server verifies it</tspan><tspan x="24" dy="27">exactly once.</tspan></text>
  </g>

  <g transform="translate(1090 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#303530" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#b8ff16"/><text x="32" y="33" class="num">5</text>
    <text x="24" y="82" class="step">DATABASE</text>
    <text x="24" y="118" class="head">Grant license</text>
    <text x="24" y="157" class="body"><tspan x="24">Order creates one</tspan><tspan x="24" dy="27">skin, five credits,</tspan><tspan x="24" dy="27">or the all-2026</tspan><tspan x="24" dy="27">entitlement.</tspan></text>
  </g>

  <g transform="translate(1350 210)">
    <rect width="200" height="310" rx="8" fill="#111511" stroke="#b8ff16" stroke-width="3" filter="url(#glow)"/>
    <circle cx="32" cy="32" r="20" fill="#b8ff16"/><text x="32" y="33" class="num">6</text>
    <text x="24" y="82" class="step">UNLOCK</text>
    <text x="24" y="118" class="head">Unlock theme</text>
    <text x="24" y="157" class="body"><tspan x="24">Extension refreshes</tspan><tspan x="24" dy="27">the license and</tspan><tspan x="24" dy="27">shows Owned without</tspan><tspan x="24" dy="27">a reinstall.</tspan></text>
  </g>

  <rect x="50" y="584" width="1500" height="170" rx="8" fill="#0d110d" stroke="#303530" stroke-width="2"/>
  <text x="84" y="632" class="head">The non-negotiable security boundary</text>
  <text x="84" y="674" class="body"><tspan fill="#b8ff16">Extension:</tspan> public API URL, random license ID, entitlement cache, packaged UI code.</text>
  <text x="84" y="709" class="body"><tspan fill="#ff5d4d">Server only:</tspan> Stripe secret key, webhook secret, price IDs, database service key, fulfillment logic.</text>
  <text x="84" y="796" class="tiny">Never grant a purchase from a success URL, editable Chrome storage, or a price supplied by the client.</text>
  <text x="1550" y="858" text-anchor="end" class="tiny">LIVE SCOREBOARD / MONETIZATION FLOW</text>
</svg>
