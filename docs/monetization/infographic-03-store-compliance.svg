<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Chrome Web Store monetization compliance checklist</title>
  <desc id="desc">Required practices, prohibited practices, and reviewer evidence for a paid skins feature.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .title{font:900 52px Inter,Arial,sans-serif;fill:#fffdf5}.sub{font:600 22px Inter,Arial,sans-serif;fill:#9da39b}
      .col{font:900 28px Inter,Arial,sans-serif;fill:#fffdf5}.item{font:650 18px Inter,Arial,sans-serif;fill:#c7cdc5}
      .foot{font:700 16px Inter,Arial,sans-serif;fill:#9da39b}.mark{font:950 20px Inter,Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#070908"/>
  <circle cx="90" cy="88" r="48" fill="#111511" stroke="#b8ff16" stroke-width="5" filter="url(#glow)"/>
  <text x="90" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter,Arial" font-size="19" font-weight="950" fill="#fffdf5">2026</text>
  <circle cx="126" cy="122" r="8" fill="#ff5d4d"/>
  <text x="160" y="82" class="title">Pass the Chrome Web Store review</text>
  <text x="160" y="119" class="sub">Paid skins are allowed. Hidden behavior, remote code, and unclear data use are not.</text>

  <g transform="translate(50 180)">
    <rect width="470" height="610" rx="8" fill="#101410" stroke="#b8ff16" stroke-width="3"/>
    <text x="34" y="55" class="col">MUST DO</text>
    <g transform="translate(34 95)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="21" class="item">Mark: Contains in-app purchases</text></g>
    <g transform="translate(34 158)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="10" class="item"><tspan x="46">Publish privacy, terms, refund,</tspan><tspan x="46" dy="25">and support pages</tspan></text></g>
    <g transform="translate(34 238)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="10" class="item"><tspan x="46">Disclose license ID, entitlements,</tspan><tspan x="46" dy="25">Stripe, Supabase, and logs</tspan></text></g>
    <g transform="translate(34 318)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="10" class="item"><tspan x="46">Use minimum permissions and</tspan><tspan x="46" dy="25">narrow HTTPS host access</tspan></text></g>
    <g transform="translate(34 398)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="10" class="item"><tspan x="46">Keep core scores useful without</tspan><tspan x="46" dy="25">a paid skin</tspan></text></g>
    <g transform="translate(34 478)"><circle cx="15" cy="15" r="15" fill="#b8ff16"/><text x="15" y="16" class="mark" fill="#070908">+</text><text x="46" y="10" class="item"><tspan x="46">State unofficial status and exact</tspan><tspan x="46" dy="25">purchase scope before checkout</tspan></text></g>
  </g>

  <g transform="translate(565 180)">
    <rect width="470" height="610" rx="8" fill="#15100f" stroke="#ff5d4d" stroke-width="3"/>
    <text x="34" y="55" class="col">MUST AVOID</text>
    <g transform="translate(34 95)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="21" class="item">Stripe secret keys in extension code</text></g>
    <g transform="translate(34 158)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="10" class="item"><tspan x="46">Remote scripts, eval, or executable</tspan><tspan x="46" dy="25">logic returned by the server</tspan></text></g>
    <g transform="translate(34 238)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="10" class="item"><tspan x="46">Unlocking from a redirect, local flag,</tspan><tspan x="46" dy="25">or client-supplied price</tspan></text></g>
    <g transform="translate(34 318)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="10" class="item"><tspan x="46">Browsing surveillance, ad targeting,</tspan><tspan x="46" dy="25">or unrelated data collection</tspan></text></g>
    <g transform="translate(34 398)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="10" class="item"><tspan x="46">Official FIFA marks, team crests, kits,</tspan><tspan x="46" dy="25">mascots, or misleading affiliation</tspan></text></g>
    <g transform="translate(34 478)"><circle cx="15" cy="15" r="15" fill="#ff5d4d"/><text x="15" y="16" class="mark" fill="#070908">x</text><text x="46" y="10" class="item"><tspan x="46">Fake urgency, hidden prices, unclear</tspan><tspan x="46" dy="25">refund rules, or dark patterns</tspan></text></g>
  </g>

  <g transform="translate(1080 180)">
    <rect width="470" height="610" rx="8" fill="#101410" stroke="#687068" stroke-width="2"/>
    <text x="34" y="55" class="col">REVIEWER PROOF</text>
    <g transform="translate(34 95)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">1</text><text x="46" y="21" class="item">Permission-by-permission justification</text></g>
    <g transform="translate(34 158)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">2</text><text x="46" y="10" class="item"><tspan x="46">Test license that unlocks products</tspan><tspan x="46" dy="25">without a real reviewer charge</tspan></text></g>
    <g transform="translate(34 238)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">3</text><text x="46" y="10" class="item"><tspan x="46">Steps for purchase, automatic unlock,</tspan><tspan x="46" dy="25">restore, refund, and offline states</tspan></text></g>
    <g transform="translate(34 318)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">4</text><text x="46" y="10" class="item"><tspan x="46">Screen recording of hosted checkout</tspan><tspan x="46" dy="25">and immediate Owned state</tspan></text></g>
    <g transform="translate(34 398)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">5</text><text x="46" y="10" class="item"><tspan x="46">Privacy disclosures match extension,</tspan><tspan x="46" dy="25">website, and dashboard answers</tspan></text></g>
    <g transform="translate(34 478)"><circle cx="15" cy="15" r="15" fill="#687068"/><text x="15" y="16" class="mark" fill="#fffdf5">6</text><text x="46" y="10" class="item"><tspan x="46">Private beta results and a responsive</tspan><tspan x="46" dy="25">support contact</tspan></text></g>
  </g>
  <text x="52" y="850" class="foot">Policy principle: be useful, be honest, request minimum access, and make the submitted code's full behavior understandable.</text>
  <text x="1548" y="850" text-anchor="end" class="foot">LIVE SCOREBOARD / STORE COMPLIANCE</text>
</svg>
